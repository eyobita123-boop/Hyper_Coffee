<div id="mobile-panel" class="mobile-panel">
  <a href="index.html#about">About</a>
  <a href="index.html#menu">Menu</a>
  <a href="events.html">Events</a>

<section style="padding:7.5rem 1.5rem 3rem; max-width:1240px; margin:0 auto;">
  <div class="eyebrow-line"><span class="rule"></span><span class="h-eyebrow">What's on</span></div>
  <h1 class="h-display" style="font-size:clamp(2.2rem,5vw,3.4rem); color:var(--roast);">Events</h1>
  <p class="body-lg" style="color:var(--roast-soft); max-width:36rem; margin-top:0.75rem;">Cuppings, ceremonies, and the occasional live set — all hosted in the café.</p>
</section>

<section class="wrap" style="max-width:1240px; padding-bottom:3rem; display:grid; grid-template-columns:1fr; gap:2rem;" id="events-layout">

  <!-- Calendar -->
  <div data-reveal style="background:#fff; border-radius:22px; border:1px solid var(--line); padding:1.75rem;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem;">
      <button id="cal-prev" aria-label="Previous month" class="btn btn-outline btn-sm" style="padding:0.5rem 0.9rem;"><i class="fas fa-chevron-left"></i></button>
      <h2 id="cal-title" class="h-display" style="font-size:1.4rem; color:var(--roast); margin:0;"></h2>
      <button id="cal-next" aria-label="Next month" class="btn btn-outline btn-sm" style="padding:0.5rem 0.9rem;"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center; font-family:var(--mono); font-size:0.7rem; color:var(--roast-soft); margin-bottom:0.4rem;">
      <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
    </div>
    <div id="cal-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px;"></div>
  </div>

  <!-- Event list for selected/upcoming -->
  <div>
    <h3 class="h-eyebrow" style="margin-bottom:1rem;" id="event-list-label">Upcoming</h3>
    <div id="event-list" style="display:flex; flex-direction:column; gap:1rem;"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="wrap" style="padding:2.5rem 1.5rem; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:1rem;">
    <span style="font-family:var(--serif); font-size:1.1rem;">Hyper Coffee</span>
    <span style="font-size:0.8rem; opacity:0.6;">&copy; 2026 Hyper Coffee. All rights reserved.</span>
  </div>
</footer>

<div id="cart-overlay" class="cart-overlay" data-close-cart></div>
<div id="cart-drawer" class="cart-drawer">
  <div style="padding:1.5rem; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;">
    <h3 class="h-display" style="font-size:1.3rem; margin:0;">Your cup</h3>
    <button data-close-cart aria-label="Close cart" style="background:none; border:none; font-size:1.3rem; cursor:pointer; color:var(--roast);">&times;</button>
  </div>
  <div id="cart-drawer-body" style="flex:1; overflow-y:auto; padding:0.5rem 1.5rem;"></div>
  <div id="cart-drawer-footer" style="padding:1.5rem; border-top:1px solid var(--line);"></div>
</div>

<style>
@media (min-width:900px){ #events-layout{grid-template-columns:1.2fr 1fr !important; align-items:flex-start;} }
.cal-day{
  aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-radius:10px; font-size:0.85rem; cursor:default; position:relative; background:var(--cream-deep);
  color:var(--roast-soft);
}
.cal-day.empty{background:transparent;}
.cal-day.has-event{background:#fff; border:1.5px solid var(--terracotta); color:var(--roast); cursor:pointer; font-weight:600;}
.cal-day.has-event:hover{background:var(--terracotta); color:#fff;}
.cal-day .dot{width:5px; height:5px; border-radius:50%; background:var(--terracotta); position:absolute; bottom:6px;}
.cal-day.has-event:hover .dot{background:#fff;}
.cal-day.today{outline:2px solid var(--gold); outline-offset:1px;}
.event-card{background:#fff; border-radius:16px; border:1px solid var(--line); padding:1.25rem; display:flex; gap:1rem;}
.event-date-chip{flex:0 0 56px; height:56px; background:var(--roast); color:var(--cream); border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:var(--mono);}
.event-date-chip .num{font-size:1.3rem; font-weight:700; line-height:1;}
.event-date-chip .mon{font-size:0.62rem; letter-spacing:0.06em; text-transform:uppercase; opacity:0.8;}
</style>

<script src="assets/site.js"></script>
<script>
// Events keyed by ISO date "YYYY-MM-DD"
const EVENTS = {
  "2026-07-04": { title:"Cupping & Ceremony", time:"10:00 AM", desc:"Guided tasting + full traditional buna ceremony with our head roaster. Free, limited seats." },
  "2026-06-27": { title:"Live Acoustic Set", time:"7:00 PM", desc:"Local acoustic duo plays the courtyard. No cover, just buy a coffee." },
  "2026-07-11": { title:"Roasting 101 Workshop", time:"11:00 AM", desc:"A hands-on intro to roast curves and tasting, capped at 8 guests." },
  "2026-07-18": { title:"Open Mic Night", time:"6:30 PM", desc:"Sign up at the counter — poetry, music, anything goes." },
  "2026-08-01": { title:"Cupping & Ceremony", time:"10:00 AM", desc:"Our monthly guided tasting and buna ceremony." },
};

let viewDate = new Date(2026, 5, 20); // June 20, 2026 — today
const today = new Date(2026, 5, 20);

function pad(n){ return n.toString().padStart(2,'0'); }
function isoOf(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

function renderCalendar(){
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  document.getElementById('cal-title').textContent = viewDate.toLocaleString('en-US',{month:'long', year:'numeric'});
  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const grid = document.getElementById('cal-grid');
  let html = '';
  for(let i=0;i<firstDay;i++) html += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const iso = isoOf(y,m,d);
    const hasEvent = !!EVENTS[iso];
    const isToday = (y===today.getFullYear() && m===today.getMonth() && d===today.getDate());
    html += `<div class="cal-day ${hasEvent?'has-event':''} ${isToday?'today':''}" data-iso="${iso}" tabindex="0" role="button">${d}${hasEvent?'<span class="dot"></span>':''}</div>`;
  }
  grid.innerHTML = html;
  grid.querySelectorAll('.cal-day.has-event').forEach(el => {
    el.addEventListener('click', () => renderEventList(el.dataset.iso));
    el.addEventListener('keydown', (e) => { if(e.key==='Enter') renderEventList(el.dataset.iso); });
  });
}

function monthAbbrev(m){ return ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][m]; }

function renderEventList(filterIso){
  const label = document.getElementById('event-list-label');
  const list = document.getElementById('event-list');
  let entries = Object.entries(EVENTS).sort((a,b)=> a[0]<b[0]?-1:1);
  if(filterIso){
    entries = entries.filter(([iso]) => iso === filterIso);
    label.textContent = new Date(filterIso+'T00:00:00').toLocaleDateString('en-US',{month:'long', day:'numeric'});
  } else {
    entries = entries.filter(([iso]) => iso >= isoOf(today.getFullYear(),today.getMonth(),today.getDate()));
    label.textContent = 'Upcoming';
  }
  if(!entries.length){
    list.innerHTML = '<div class="empty-state">No events on this day.</div>';
    return;
  }
  list.innerHTML = entries.map(([iso, ev]) => {
    const d = new Date(iso+'T00:00:00');
    return `
    <div class="event-card" data-reveal>
      <div class="event-date-chip"><span class="num">${d.getDate()}</span><span class="mon">${monthAbbrev(d.getMonth())}</span></div>
      <div>
        <p style="font-weight:700; margin:0 0 0.2rem; color:var(--roast);">${ev.title}</p>
        <p style="font-family:var(--mono); font-size:0.78rem; color:var(--terracotta); margin:0 0 0.4rem;">${ev.time}</p>
        <p style="font-size:0.88rem; color:var(--roast-soft); margin:0;">${ev.desc}</p>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('cal-prev').addEventListener('click', () => { viewDate.setMonth(viewDate.getMonth()-1); renderCalendar(); });
document.getElementById('cal-next').addEventListener('click', () => { viewDate.setMonth(viewDate.getMonth()+1); renderCalendar(); });

renderCalendar();
renderEventList(null);
</script>
</body>
</html>
